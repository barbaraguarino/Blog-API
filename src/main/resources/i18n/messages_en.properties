# 1. GLOBAL AND SERVER ERRORS
error.server.internal=An unexpected internal server error occurred. Please contact support.
error.resource.not_found=The requested resource was not found on the server.
error.http.method_not_supported=The HTTP method used is not supported by this endpoint.

# 2. VALIDATION ERRORS (Generic DTOs)
error.validation.generic=Validation error in the provided data.
error.validation.field=Invalid field.

# 3. SECURITY AND AUTHENTICATION (Auth)
error.auth.access_denied=You do not have sufficient privileges to access this resource.
error.auth.bad_credentials=Incorrect e-mail or password.
error.auth.user_not_found=User not found with the e-mail: {0}.
error.auth.user_not_found_google=Account not found. Please register before logging in.
error.auth.invalid_google_token=The Google token is invalid or expired.
error.security.token_generation=An internal error occurred while trying to generate the authentication token.

# 4. USER MODULE (User)
error.user.already_exists=A user is already registered with this e-mail.
error.user.provider_conflict=This e-mail is already registered. Please log in traditionally with your password.
error.user.name.not_blank=Name is required.
error.user.name.size=Name must have a maximum of 150 characters.
error.user.email.not_blank=E-mail is required.
error.user.email.invalid=Invalid e-mail format.
error.user.email.size=E-mail must have a maximum of 150 characters.
error.user.password.not_blank=Password is required.
error.user.password.size=Password must be at least 8 characters long.
error.user.password.complexity=Password must contain at least 2 uppercase letters, 2 lowercase letters, 2 numbers, and 1 special character.

# 5. LITERARY CATALOG MODULE (Catalog)
error.catalog.genre.name_already_exists=This genre is already registered for the provided language.
error.validation.genre.translations.not_empty=At least one translation must be provided for the genre.
error.validation.language_code.not_blank=The language code is required.
error.validation.language_code.pattern=The language code must follow the ISO standard (e.g., pt-BR, en-US).
error.validation.genre_name.not_blank=The genre name is required.
error.validation.genre_name.size=The genre name cannot exceed 150 characters.